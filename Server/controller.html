<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="screen-orientation" content="landscape" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>인형뽑기 컨트롤러</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            user-select: none;
            padding: 20px 40px;
            overflow: hidden;
        }

        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #888;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        #status.on {
            color: #5ad15a;
        }

        /* 왼쪽: D-Pad */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 6px;
            margin-left: 40px;
        }

        .btn {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: linear-gradient(145deg, #2a2a3e, #1f1f2e);
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.1s;
        }

        .btn:active {
            background: linear-gradient(145deg, #3a3a4e, #2f2f3e);
            transform: translateY(2px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .up {
            grid-column: 2;
            grid-row: 1;
        }

        .left {
            grid-column: 1;
            grid-row: 2;
        }

        .right {
            grid-column: 3;
            grid-row: 2;
        }

        .down {
            grid-column: 2;
            grid-row: 3;
        }

        /* 오른쪽: 액션 버튼 (ABXY 스타일) */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-right: 40px;
        }

        .action-btn {
            width: 180px;
            height: 65px;
            border: none;
            border-radius: 35px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
            border-radius: 35px 35px 0 0;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.6);
        }

        .btn-grab {
            background: linear-gradient(145deg, #107c10, #0e6b0e);
            color: #fff;
        }

        .btn-grab:active {
            background: linear-gradient(145deg, #0e6b0e, #0c5a0c);
        }

        .btn-release {
            background: linear-gradient(145deg, #0078d4, #0063b1);
            color: #fff;
        }

        .btn-release:active {
            background: linear-gradient(145deg, #0063b1, #00508e);
        }

        /* 중앙 로고 영역 */
        .center-logo {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            opacity: 0.1;
            pointer-events: none;
        }

        /* 세로 화면 반응형 */
        @media (orientation: portrait) {
            body {
                flex-direction: column;
                justify-content: center;
                gap: 40px;
                padding: 40px 20px;
            }

            .dpad {
                margin-left: 0;
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
            }

            .action-buttons {
                margin-right: 0;
                flex-direction: row;
                gap: 15px;
            }

            .action-btn {
                width: 150px;
                height: 60px;
            }

            .center-logo {
                font-size: 36px;
            }
        }
    </style>
</head>

<body>
    <div id="status">연결 중...</div>

    <!-- 왼쪽: D-Pad (방향키) -->
    <div class="dpad">
        <button class="btn up" data-cmd="up">▲</button>
        <button class="btn left" data-cmd="left">◀</button>
        <button class="btn right" data-cmd="right">▶</button>
        <button class="btn down" data-cmd="down">▼</button>
    </div>

    <!-- 오른쪽: 액션 버튼 -->
    <div class="action-buttons">
        <button class="action-btn btn-grab" data-cmd="confirm">Grab</button>
        <button class="action-btn btn-release" data-cmd="release">Release</button>
    </div>

    <!-- 서버가 보내주는 Socket.IO 라이브러리 -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const MACHINE_ID = "machine01"; // 어느 기계를 조작할지 (Unity와 같아야 함)

        const socket = io(); // 이 페이지를 보내준 서버에 자동 연결
        const statusEl = document.getElementById("status");

        socket.on("connect", () => {
            socket.emit("join", MACHINE_ID);
            statusEl.textContent = "연결됨 ✓";
            statusEl.classList.add("on");
        });

        socket.on("disconnect", () => {
            statusEl.textContent = "연결 끊김";
            statusEl.classList.remove("on");
        });

        // 버튼을 누르는 순간 / 떼는 순간을 각각 서버로 전송
        // (갈고리는 "누르고 있는 동안" 움직여야 하므로 down/up을 구분)
        function send(cmd, action) {
            socket.emit("input", { machineId: MACHINE_ID, cmd, action });
        }

        document.querySelectorAll("[data-cmd]").forEach((btn) => {
            const cmd = btn.dataset.cmd;

            if (cmd === "confirm" || cmd === "release") {
                // 확인/놓기는 누르는 순간 한 번만
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); send(cmd, "down"); });
            } else {
                // 방향키는 누름/뗌 둘 다
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); send(cmd, "down"); });
                btn.addEventListener("touchend", (e) => { e.preventDefault(); send(cmd, "up"); });
            }
        });
    </script>
</body>

</html>
